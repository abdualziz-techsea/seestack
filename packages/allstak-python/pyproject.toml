[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "allstak"
version = "0.1.0"
description = "Official Python SDK for AllStak — observability, error tracking, logs, and more"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "AllStak", email = "sdk@allstak.dev" }]
keywords = ["observability", "error-tracking", "logging", "monitoring", "apm"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "httpx>=0.25.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.23",
    "pytest-mock>=3.12",
    "respx>=0.20",
    "python-dotenv>=1.0",
]
django = ["django>=3.2"]
flask = ["flask>=2.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/allstak"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "integration: marks tests that require a running AllStak backend",
]
