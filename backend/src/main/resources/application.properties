# ============================================================
# AllStak Backend — Application Properties
# All secrets must be set as environment variables.
# Never hardcode values here.
# ============================================================

spring.application.name=allstak-backend

# ── Server ──────────────────────────────────────────────────
server.port=8080

# ── Virtual Threads ─────────────────────────────────────────
spring.threads.virtual.enabled=true

# ── PostgreSQL ──────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:allstak}
spring.datasource.username=${POSTGRES_USER:allstak}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ── Flyway ──────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.url=${spring.datasource.url}
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}

# ── Redis ───────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ── Kafka ───────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.consumer.group-id=allstak-consumers
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest

# ── Keycloak / OAuth2 Resource Server ───────────────────────
# Only use jwk-set-uri (not issuer-uri) to avoid issuer mismatch
# between Docker-internal hostname and external hostname
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_URI:http://localhost:8180/realms/allstak/protocol/openid-connect/certs}

# ── ClickHouse ──────────────────────────────────────────────
clickhouse.host=${CLICKHOUSE_HOST:localhost}
clickhouse.port=${CLICKHOUSE_PORT:8123}
clickhouse.database=${CLICKHOUSE_DB:allstak}
clickhouse.username=${CLICKHOUSE_USER:default}
clickhouse.password=${CLICKHOUSE_PASSWORD:}

# ── SSH Key Encryption ──────────────────────────────────────
# AES-256 key for encrypting SSH private keys at rest (must be 32 chars)
allstak.ssh.encryption-key=${SSH_ENCRYPTION_KEY}

# ── Actuator ────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.kafka.enabled=true
management.health.redis.enabled=true
management.health.db.enabled=true

# ── Logging ─────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.allstak=DEBUG
logging.level.org.springframework.security=WARN

# ── Moyasar Billing ───────────────────────────────────────
moyasar.secret-key=${MOYASER_SECRET_KEY:}
moyasar.publishable-key=${MOYASER_PUBLIC_KEY:}
allstak.base-url=${ALLSTAK_BASE_URL:http://localhost:3000}
allstak.backend-url=${ALLSTAK_BACKEND_URL:http://localhost:8080}

# ── Notification Channels (Scaffolded) ────────────────────
# OneSignal — uncomment and fill when ready
# onesignal.app-id=
# onesignal.rest-api-key=

# Azure Communication Services — uncomment and fill when ready
# azure.communication.email.connection-string=
# azure.communication.email.from-address=noreply@allstak.io

# Manual ack for Kafka consumers (allows retry on failure)
spring.kafka.listener.ack-mode=manual
