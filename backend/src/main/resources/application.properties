# ============================================================
# SeeStack Backend — Application Properties
# All secrets must be set as environment variables.
# Never hardcode values here.
# ============================================================

spring.application.name=seestack-backend

# ── Server ──────────────────────────────────────────────────
server.port=8080

# ── Virtual Threads ─────────────────────────────────────────
spring.threads.virtual.enabled=true

# ── PostgreSQL ──────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:seestack}
spring.datasource.username=${POSTGRES_USER:seestack}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ── Flyway ──────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.url=${spring.datasource.url}
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}

# ── Redis ───────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ── Kafka ───────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.consumer.group-id=seestack-consumers
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest

# ── Internal JWT Auth ───────────────────────────────────────
seestack.jwt.secret=${SEESTACK_JWT_SECRET:dev-insecure-change-me-in-production-32chars}

# ── ClickHouse ──────────────────────────────────────────────
clickhouse.host=${CLICKHOUSE_HOST:localhost}
clickhouse.port=${CLICKHOUSE_PORT:8123}
clickhouse.database=${CLICKHOUSE_DB:seestack}
clickhouse.username=${CLICKHOUSE_USER:default}
clickhouse.password=${CLICKHOUSE_PASSWORD:}

# ── Actuator ────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.kafka.enabled=true
management.health.redis.enabled=true
management.health.db.enabled=true

# ── Logging ─────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.seestack=DEBUG
logging.level.org.springframework.security=WARN

spring.kafka.listener.ack-mode=manual
