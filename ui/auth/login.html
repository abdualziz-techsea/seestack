<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AllStak — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&family=Rubik:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<style>
/* Auth page body override */
body{display:flex;flex-direction:column;min-height:100vh;height:auto;overflow:auto;
  background-image:radial-gradient(rgba(255,255,255,0.03) 1px,transparent 1px);background-size:20px 20px}

/* Auth topbar */
.topbar{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text-primary)}
.logo svg{flex-shrink:0}
.logo-text{font-size:15px;font-weight:600;letter-spacing:-0.012em}
.topbar-right{display:flex;align-items:center;gap:12px}
.help-link{font-size:13px;color:var(--text-secondary);text-decoration:none}
.help-link:hover{color:var(--text-primary)}

/* Centered card layout */
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
.card{width:100%;max-width:400px;background:transparent;border:none;border-radius:0;box-shadow:none}
.card-logo{display:flex;justify-content:center;margin-bottom:32px}
.heading{font-size:24px;font-weight:600;letter-spacing:-0.022em;text-align:center;margin-bottom:4px}
.subheading{font-size:13px;color:var(--text-secondary);text-align:center;margin-bottom:28px}

/* Auth button full-width overrides */
.card .btn{width:100%;height:40px}
.card .btn+.btn{margin-top:8px}

/* Form row */
.form-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.form-link{font-size:13px;color:var(--primary-text);text-decoration:none;font-weight:500}
.form-link:hover{text-decoration:underline}

/* Footer */
.footer{text-align:center;margin-top:24px;font-size:13px;color:var(--text-secondary)}
.footer a{color:var(--primary-text);text-decoration:none;font-weight:500}
.footer a:hover{text-decoration:underline}

/* Page footer */
.page-footer{padding:16px;text-align:center;font-size:12px;color:var(--text-tertiary);flex-shrink:0}
.page-footer a{color:var(--text-tertiary);text-decoration:none;margin:0 8px}
.page-footer a:hover{color:var(--text-secondary)}

/* GitHub icon */
.icon-gh{width:16px;height:16px;fill:currentColor;flex-shrink:0}
</style>
</head>
<body>
<header class="topbar">
  <a href="login.html" class="logo">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="2" fill="var(--primary)"/><rect x="13" y="3" width="8" height="8" rx="2" fill="var(--primary)" opacity=".6"/><rect x="3" y="13" width="8" height="8" rx="2" fill="var(--primary)" opacity=".6"/><rect x="13" y="13" width="8" height="8" rx="2" fill="var(--primary)" opacity=".3"/></svg>
    <span class="logo-text">AllStak</span>
  </a>
  <div class="topbar-right">
    <a href="#" class="help-link"><span data-en="Help" data-ar="مساعدة">Help</span></a>
    <div class="lang-btn"><button class="on" onclick="toggleLang()">EN</button><button onclick="toggleLang()">AR</button></div>
    <div class="theme-btn"><button class="on" onclick="setTheme('dark')">&#9789;</button><button onclick="setTheme('light')">&#9788;</button></div>
  </div>
</header>

<main class="main">
  <div class="card">
    <div class="card-logo">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="2" fill="var(--primary)"/><rect x="13" y="3" width="8" height="8" rx="2" fill="var(--primary)" opacity=".6"/><rect x="3" y="13" width="8" height="8" rx="2" fill="var(--primary)" opacity=".6"/><rect x="13" y="13" width="8" height="8" rx="2" fill="var(--primary)" opacity=".3"/></svg>
    </div>
    <h1 class="heading"><span data-en="Welcome back" data-ar="مرحباً بعودتك">Welcome back</span></h1>
    <p class="subheading"><span data-en="Sign in to continue to AllStak" data-ar="تسجيل الدخول للمتابعة إلى AllStak">Sign in to continue to AllStak</span></p>

    <div class="alert alert-danger" id="login-alert">&#9888; <span data-en="Invalid email or password. Try again or reset your password." data-ar="بريد إلكتروني أو كلمة مرور غير صالحة. حاول مرة أخرى أو أعد تعيين كلمة المرور.">Invalid email or password. Try again or reset your password.</span></div>

    <button class="btn btn-sec" onclick="showToast('OAuth not available in demo')">
      <svg class="icon-gh" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      <span data-en="Continue with GitHub" data-ar="المتابعة عبر GitHub">Continue with GitHub</span>
    </button>
    <button class="btn btn-sec" onclick="showToast('OAuth not available in demo')">
      <svg width="16" height="16" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      <span data-en="Continue with Google" data-ar="المتابعة عبر Google">Continue with Google</span>
    </button>

    <div class="divider"><span data-en="or continue with email" data-ar="أو المتابعة بالبريد الإلكتروني">or continue with email</span></div>

    <form id="login-form" onsubmit="return handleLogin(event)">
      <div class="fg" id="f-email">
        <label><span data-en="Work email" data-ar="البريد الإلكتروني">Work email</span></label>
        <input type="email" placeholder="you@company.com" required>
        <div class="err"><span data-en="Please enter a valid email" data-ar="يرجى إدخال بريد إلكتروني صالح">Please enter a valid email</span></div>
      </div>
      <div class="fg" id="f-pw">
        <label><span data-en="Password" data-ar="كلمة المرور">Password</span></label>
        <div class="pw-wrap">
          <input type="password" placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;" required>
          <button type="button" class="pw-tog" onclick="togglePw(this)" data-en="Show" data-ar="إظهار">Show</button>
        </div>
        <div class="err"><span data-en="Password is required" data-ar="كلمة المرور مطلوبة">Password is required</span></div>
      </div>
      <div class="form-row">
        <label class="chk-wrap"><input type="checkbox"><span class="chk-box"></span><span data-en="Remember me" data-ar="تذكرني">Remember me</span></label>
        <a href="forgot-password.html" class="form-link"><span data-en="Forgot password?" data-ar="نسيت كلمة المرور؟">Forgot password?</span></a>
      </div>
      <button type="submit" class="btn btn-pri" id="login-btn"><span data-en="Sign in" data-ar="تسجيل الدخول">Sign in</span></button>
    </form>

    <div class="footer"><span data-en="Don't have an account?" data-ar="ليس لديك حساب؟">Don't have an account?</span> <a href="register.html"><span data-en="Create account &#8594;" data-ar="إنشاء حساب &#8592;">Create account &#8594;</span></a></div>
  </div>
</main>

<footer class="page-footer">
  <a href="#"><span data-en="Privacy Policy" data-ar="سياسة الخصوصية">Privacy Policy</span></a><a href="#"><span data-en="Terms of Service" data-ar="شروط الخدمة">Terms of Service</span></a><a href="#"><span data-en="Status" data-ar="الحالة">Status</span></a>
</footer>

<div class="toast-wrap" id="tw"></div>

<script>
function setTheme(t){document.documentElement.setAttribute('data-theme',t);document.querySelectorAll('.theme-btn button').forEach(b=>b.classList.toggle('on',b.textContent==='\u263D'?t==='dark':t==='light'))}
function togglePw(btn){const i=btn.previousElementSibling;const lang=document.documentElement.lang;if(i.type==='password'){i.type='text';btn.textContent=lang==='ar'?'إخفاء':'Hide'}else{i.type='password';btn.textContent=lang==='ar'?'إظهار':'Show'}}
function toggleLang(){const h=document.documentElement;const isEn=h.lang==='en';const newLang=isEn?'ar':'en';h.lang=newLang;h.dir=newLang==='ar'?'rtl':'ltr';localStorage.setItem('allstak-lang',newLang);document.querySelectorAll('.lang-btn button').forEach(b=>b.classList.toggle('on',b.textContent===newLang.toUpperCase()));applyLang(newLang)}
function applyLang(lang){document.querySelectorAll('[data-en][data-ar]').forEach(el=>{el.textContent=el.getAttribute('data-'+lang)})}
function handleLogin(e){
  e.preventDefault();
  let valid=true;
  document.querySelectorAll('#login-form .fg').forEach(g=>{
    const i=g.querySelector('input');
    if(!i.value.trim()||(i.type==='email'&&!i.value.includes('@'))){g.classList.add('invalid');valid=false}
    else g.classList.remove('invalid');
  });
  if(!valid)return false;
  const btn=document.getElementById('login-btn');
  const lang=document.documentElement.lang;
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>'+(lang==='ar'?'جاري تسجيل الدخول...':'Signing in...');
  document.querySelectorAll('#login-form input').forEach(i=>i.disabled=true);
  setTimeout(()=>{
    btn.disabled=false;btn.innerHTML='<span data-en="Sign in" data-ar="تسجيل الدخول">'+(lang==='ar'?'تسجيل الدخول':'Sign in')+'</span>';
    document.querySelectorAll('#login-form input').forEach(i=>i.disabled=false);
    window.location.href='../auth/onboarding.html';
  },1500);
  return false;
}
document.querySelectorAll('.fg input').forEach(i=>i.addEventListener('input',()=>i.closest('.fg').classList.remove('invalid')));
function showToast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.getElementById('tw').appendChild(t);setTimeout(()=>t.remove(),2500)}
(function(){const saved=localStorage.getItem('allstak-lang');if(saved&&saved!=='en'){document.documentElement.lang=saved;document.documentElement.dir=saved==='ar'?'rtl':'ltr';document.querySelectorAll('.lang-btn button').forEach(b=>b.classList.toggle('on',b.textContent===saved.toUpperCase()));applyLang(saved)}})();
</script>
</body>
</html>
