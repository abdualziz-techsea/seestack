services:
  postgres:
    ports:
      - "5433:5432"
  clickhouse:
    ports:
      - "18123:8123"
      - "19000:9000"
  kafka:
    ports:
      - "19092:9092"
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,EXTERNAL://localhost:19092
  redis:
    ports:
      - "16379:6379"
